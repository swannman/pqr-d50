## Managed components from the ESP Component Registry (components.espressif.com).
## cdc_acm is pulled transitively at the version the FTDI driver needs.
dependencies:
  idf: ">=5.0"
  espressif/usb_host_vcp: "^1.0.0"        # generic Virtual COM Port host service
  espressif/usb_host_ftdi_vcp: "^2.0.0"   # FTDI VCP driver (D50's internal FT232)
